name: Node.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: # Allows you to run this workflow manually from the Actions tab

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18.x'
        registry-url: 'https://registry.npmjs.org'
        
    - name: Install dependencies
      run: npm ci

    # This step legitimately tests that your published package can be installed
    # from the public NPM registry by a third-party environment.
    - name: Test Published Package Installation
      run: |
        mkdir test-install
        cd test-install
        npm init -y
        npm install @gojo89427/minipay
